name: Windows Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check build prerequisites
        shell: pwsh
        working-directory: app
        run: |
          $ErrorActionPreference = "Stop"

          $nodeVersion = node -v
          node -e "const [maj,min]=process.versions.node.split('.').map(Number); process.exit((maj===20&&min>=19)||maj>22||(maj===22&&min>=12)?0:1)"
          if ($LASTEXITCODE -ne 0) {
            throw "Node.js $nodeVersion is unsupported. Install Node.js 20.19+ or 22.12+."
          }
          Write-Host "[OK] Node.js $nodeVersion"

          $cargoVersion = cargo -V
          Write-Host "[OK] $cargoVersion"

          $rc = Get-Command rc.exe -ErrorAction SilentlyContinue
          if ($rc) {
            Write-Host "[OK] Windows resource compiler: $($rc.Source)"
          } else {
            $foundRc = & powershell -NoProfile -ExecutionPolicy Bypass -File "scripts\find-windows-rc.ps1" x64 2>$null | Select-Object -First 1
            if (-not $foundRc) {
              throw "Windows SDK resource compiler rc.exe not found. Install Windows SDK or Visual Studio Build Tools with Desktop development with C++."
            }

            $rcDir = Split-Path $foundRc -Parent
            $rcDir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            Write-Host "[OK] Windows resource compiler: $foundRc"
          }

      - name: Install dependencies
        shell: pwsh
        working-directory: app
        run: npm install

      - name: Stop existing executable before rebuild
        shell: pwsh
        working-directory: app
        run: |
          $ErrorActionPreference = "Stop"
          $exe = "src-tauri\target\release\FreeUltraCode.exe"
          if (Test-Path $exe) {
            powershell -NoProfile -ExecutionPolicy Bypass -File "scripts\stop-running-exe.ps1" $exe
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to close running exe before rebuild."
            }
          }

      - name: Build frontend, Rust app, and installer
        shell: pwsh
        working-directory: app
        run: npm run package

      - name: Save build fingerprint
        shell: pwsh
        working-directory: app
        run: |
          $ErrorActionPreference = "Stop"
          powershell -NoProfile -ExecutionPolicy Bypass -File "scripts\needs-rebuild.ps1" "$env:GITHUB_WORKSPACE\app\src-tauri\target\release\FreeUltraCode.exe" "$env:GITHUB_WORKSPACE" -WriteStamp
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to save build fingerprint."
          }

      - name: Show build outputs
        shell: pwsh
        run: |
          $releaseDir = "$env:GITHUB_WORKSPACE\app\src-tauri\target\release"
          Write-Host "Standalone app:"
          Get-Item "$releaseDir\FreeUltraCode.exe"
          Write-Host "Installer:"
          Get-ChildItem "$releaseDir\bundle\nsis\*.exe"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FreeUltraCode-windows
          if-no-files-found: error
          path: |
            app/src-tauri/target/release/FreeUltraCode.exe
            app/src-tauri/target/release/bundle/nsis/*.exe

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/src-tauri/target/release/FreeUltraCode.exe
            app/src-tauri/target/release/bundle/nsis/*.exe
